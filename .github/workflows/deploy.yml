name: Manual Terraform Deploy

on:
  workflow_dispatch:   # ← 手動実行専用トリガー

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_VAR_project: tastylog
  TF_VAR_env: dev


jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    environment:
      name: production   # ← 承認が必要な Environment に紐づけられる
      url: https://github.com/${{ github.repository }}

    steps:
      - uses: actions/checkout@v3

       - name: Debug OIDC Claims
        run: |
          echo "Fetching OIDC token..."
          TOKEN=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL")
          RAW=$(echo "$TOKEN" | jq -r '.value')
          echo "OIDC Payload:"
          echo $RAW | cut -d '.' -f2 | base64 -d | jq

      - name: Configure AWS credentials (OIDC Assume Role)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::695394391597:role/GitHubActionsTerraformRole
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
