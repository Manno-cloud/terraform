name: Manual Terraform Deploy

on:
  workflow_dispatch:   # ← 手動実行専用トリガー

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_VAR_project: tastylog
  TF_VAR_env: dev

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    environment:
      name: production   # ← 承認が必要な Environment に紐づけられる
      url: https://github.com/${{ github.repository }}

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC Assume Role)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::695394391597:role/GitHubActionsTerraformRole
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
